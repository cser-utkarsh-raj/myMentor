<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c1b"/>
      <stop offset="50%" stop-color="#15102a"/>
      <stop offset="100%" stop-color="#06040a"/>
    </linearGradient>
    
    <!-- Lightning Bolt Gradient -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    
    <!-- Outer Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Outer Glow Ring -->
  <rect width="504" height="504" x="4" y="4" rx="124" fill="none" stroke="url(#boltGrad)" stroke-width="8" opacity="0.3" filter="url(#glow)"/>

  <!-- Brand Lightning Bolt (Zap) Icon -->
  <path d="M280 40 L100 280 L260 280 L240 472 L420 232 L260 232 Z" 
        fill="url(#boltGrad)" 
        filter="url(#glow)" />
</svg>